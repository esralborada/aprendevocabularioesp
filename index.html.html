<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>¡Aprendo Español! - Juego Educativo</title>
    <style>
        :root {
            --primary: #4CAF50;
            --secondary: #FF9800;
            --accent: #2196F3;
            --bg: #f0f9ff;
            --text: #333;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg);
            color: var(--text);
            display: flex;
            flex-direction: column;
            align-items: center;
            margin: 0;
            padding: 20px;
            user-select: none;
        }

        #game-container {
            background: white;
            padding: 30px;
            border-radius: 25px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            max-width: 600px;
            width: 100%;
            text-align: center;
        }

        /* Pantallas */
        .screen { display: none; }
        .screen.active { display: block; }

        /* Pantalla de Selección */
        .category-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        .cat-btn {
            background: #fff;
            border: 3px solid #ddd;
            border-radius: 15px;
            padding: 15px;
            font-size: 1.1rem;
            cursor: pointer;
            transition: all 0.2s;
            font-weight: bold;
        }

        .cat-btn:hover {
            transform: translateY(-3px);
            border-color: var(--secondary);
            background: #fffbf5;
        }

        /* Pantalla de Juego */
        #header {
            display: flex;
            justify-content: space-between;
            margin-bottom: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        #image-display {
            font-size: 120px;
            margin: 20px 0;
            background: #fff;
            border: 4px dashed #ddd;
            border-radius: 20px;
            padding: 20px;
            transition: transform 0.3s;
        }

        .options-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
            margin-top: 20px;
        }

        button {
            padding: 20px;
            font-size: 1.3rem;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            background: #f8f9fa;
            border: 3px solid #eee;
            transition: all 0.2s;
            font-weight: 600;
        }

        button:hover:not(:disabled) {
            transform: translateY(-3px);
            background: #e9ecef;
        }

        button.correct {
            background-color: #d4edda !important;
            border-color: #28a745 !important;
            color: #155724;
        }

        button.incorrect {
            background-color: #f8d7da !important;
            border-color: #dc3545 !important;
            color: #721c24;
        }

        #feedback {
            height: 30px;
            margin-top: 20px;
            font-size: 1.2rem;
            font-weight: bold;
        }

        .score-box { color: var(--primary); }
        
        .audio-btn {
            background: var(--accent);
            color: white;
            padding: 10px 20px;
            border-radius: 50px;
            margin: 0 5px;
        }

        .back-btn {
            background: #e0e0e0;
            color: #555;
            padding: 10px 20px;
            border-radius: 50px;
            margin: 0 5px;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .options-grid, .category-grid { grid-template-columns: 1fr; }
            #image-display { font-size: 80px; }
        }
    </style>
</head>
<body>

    <div id="game-container">
        
        <div id="menu-screen" class="screen active">
            <h2>¡Hola! ¿Qué quieres aprender hoy?</h2>
            <p>Elige una categoría para empezar:</p>
            <div class="category-grid" id="categories-menu">
                </div>
        </div>

        <div id="game-screen" class="screen">
            <div id="header">
                <div class="score-box">Puntos: <span id="score">0</span></div>
                <div id="category-name" style="color: #666;">Categoría</div>
            </div>

            <div style="margin-bottom: 15px;">
                <button class="back-btn" onclick="showMenu()">⬅️ Cambiar Tema</button>
                <button class="audio-btn" onclick="speakCurrentWord()">🔊 Escuchar</button>
            </div>
            
            <div id="image-display">❓</div>

            <div id="feedback"></div>

            <div class="options-grid" id="options">
                </div>
        </div>
    </div>

            { p: "sol", c: "clima", i: "☀️" }, { p: "luna", c: "clima", i: "🌙" }, { p: "estrella", c: "clima", i: "⭐" }, { p: "nube", c: "clima", i: "☁️" },

            { p: "fuego", c: "clima", i: "🔥" }, { p: "árbol", c: "clima", i: "🌳" }, { p: "flor", c: "clima", i: "🌻" }, { p: "hoja", c: "clima", i: "🍃" },

            { p: "fútbol", c: "deportes", i: "⚽" }, { p: "baloncesto", c: "deportes", i: "🏀" }, { p: "tenis", c: "deportes", i: "🎾" }, { p: "béisbol", c: "deportes", i: "⚾" },
            { p: "natación", c: "deportes", i: "🏊" }, { p: "boxeo", c: "deportes", i: "🥊" }, { p: "patinaje", c: "deportes", i: "⛸️" }, { p: "esquí", c: "deportes", i: "🎿" },
            { p: "ajedrez", c: "deportes", i: "♟️" }, { p: "videojuegos", c: "deportes", i: "🎮" }, { p: "pesca", c: "deportes", i: "🎣" }, { p: "carrera", c: "deportes", i: "🏃" },

        let score = 0;
        let currentItem = null;
        let mistakes = [];
        let shuffledList = [];
        let currentCategory = "todas";

        // Mapeo de categorías a emojis para el menú
        const categoryEmojis = {
            "animales": "🦁", "frutas": "🍎", "escuela": "🎒", 
            "transporte": "🚀", "ropa": "👕", "hogar": "🏠", 
            "cuerpo": "💪", "música": "🎸", "clima": "🌈", "deportes": "⚽"
        };

        function buildMenu() {
            const menuContainer = document.getElementById('categories-menu');
            menuContainer.innerHTML = "";
            
            // Obtener categorías únicas
            const categories = [...new Set(database.map(item => item.c))];
            
            // Botón para TODAS las categorías
            const allBtn = document.createElement('button');
            allBtn.className = "cat-btn";
            allBtn.innerHTML = "🎲 Todas Juntas";
            allBtn.onclick = () => startGame("todas");
            menuContainer.appendChild(allBtn);

            // Botones por categoría
            categories.forEach(cat => {
                const btn = document.createElement('button');
                btn.className = "cat-btn";
                const emoji = categoryEmojis[cat] || "📂";
                btn.innerHTML = `${emoji} ${cat.toUpperCase()}`;
                btn.onclick = () => startGame(cat);
                menuContainer.appendChild(btn);
            });
        }

        function showMenu() {
            document.getElementById('game-screen').classList.remove('active');
            document.getElementById('menu-screen').classList.add('active');
        }

        function startGame(category) {
            currentCategory = category;
            score = 0;
            mistakes = [];
            updateScore();

            if (category === "todas") {
                shuffledList = [...database].sort(() => Math.random() - 0.5);
            } else {
                shuffledList = database.filter(item => item.c === category).sort(() => Math.random() - 0.5);
            }

            document.getElementById('menu-screen').classList.remove('active');
            document.getElementById('game-screen').classList.add('active');
            
            nextQuestion();
        }

        function nextQuestion() {
            if (shuffledList.length === 0) {
                if (mistakes.length > 0) {
                    alert("¡Buen trabajo! Vamos a repasar las que fallaste.");
                    shuffledList = [...mistakes];
                    mistakes = [];
                } else {
                    alert("¡Genial! Has terminado esta categoría.");
                    showMenu();
                    return;
                }
            }

            currentItem = shuffledList.pop();
            document.getElementById('image-display').textContent = currentItem.i;
            document.getElementById('category-name').textContent = "Tema: " + currentItem.c.toUpperCase();
            document.getElementById('feedback').textContent = "";
            generateOptions();
        }

        function generateOptions() {
            const container = document.getElementById('options');
            container.innerHTML = "";

            // Buscamos distractores de la misma categoría de la palabra actual
            let distractors = database
                .filter(x => x.c === currentItem.c && x.p !== currentItem.p)
                .sort(() => Math.random() - 0.5)
                .slice(0, 3)
                .map(x => x.p);

            let options = [currentItem.p, ...distractors].sort(() => Math.random() - 0.5);

            options.forEach(opt => {
                const btn = document.createElement('button');
                btn.textContent = opt;
                btn.onclick = () => checkAnswer(opt, btn);
                container.appendChild(btn);
            });
        }

        function checkAnswer(selected, btn) {
            const buttons = document.querySelectorAll('#options button');
            buttons.forEach(b => b.disabled = true);

            if (selected === currentItem.p) {
                btn.classList.add('correct');
                document.getElementById('feedback').innerHTML = "¡Muy bien! 🌟";
                score += 10;
                updateScore();
                speakCurrentWord();
                setTimeout(nextQuestion, 1500);
            } else {
                btn.classList.add('incorrect');
                document.getElementById('feedback').innerHTML = `Es "${currentItem.p.toUpperCase()}"`;
                mistakes.push(currentItem);
                
                buttons.forEach(b => {
                    if (b.textContent === currentItem.p) b.classList.add('correct');
                });
                
                setTimeout(nextQuestion, 2500);
            }
        }

        function updateScore() {
            document.getElementById('score').textContent = score;
        }

        function speakCurrentWord() {
            if ('speechSynthesis' in window) {
                const msg = new SpeechSynthesisUtterance();
                msg.text = currentItem.p;
                msg.lang = 'es-ES';
                msg.rate = 0.85; // Un poco más lento para niños
                window.speechSynthesis.speak(msg);
            }
        }

        // Iniciar construyendo el menú
        buildMenu();
    </script>
</body>
</html>
